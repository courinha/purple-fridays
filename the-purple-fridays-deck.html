<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Purple Fridays — Brand Assets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f3f0;
            --ink: #111111;
            --line: rgba(17, 17, 17, 0.15);
            --nav: #5c5b57;
            --nav-h: 68px;
            --side: 56px;
            --label-side: 80px;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
        }

        .deck {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transform: translateX(0);
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .slide.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
            z-index: 2;
        }

        /* Outgoing/incoming offsets — direction set by JS via .from-right / .from-left */
        .slide.from-right { transform: translateX(36px); }
        .slide.from-left  { transform: translateX(-36px); }

        @media (prefers-reduced-motion: reduce) {
            .slide {
                transition: opacity 0.3s ease;
            }
            .slide.from-right,
            .slide.from-left { transform: translateX(0); }
        }

        .slide-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 28px var(--label-side) 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: clamp(10px, 1vw, 12px);
            flex-shrink: 0;
        }

        .slide-label .eyebrow {
            color: rgba(17, 17, 17, 0.45);
            font-weight: 500;
            margin-right: 8px;
        }

        .slide-label .slash {
            display: inline-block;
            opacity: 0.55;
            font-weight: 400;
            transform: translateY(-0.04em);
            margin: 0 7px;
        }

        .slide-label .count {
            font-weight: 500;
            color: rgba(17, 17, 17, 0.45);
            font-variant-numeric: tabular-nums;
        }

        .slide-image {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 var(--side);
            padding-bottom: calc(var(--nav-h) + 20px);
            min-height: 0;
        }

        .image-card {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid var(--line);
            box-shadow: 0 30px 60px rgba(17, 17, 17, 0.1);
            padding: clamp(16px, 3vw, 36px);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Images are never scaled beyond their natural pixel size — only ever
           scaled down to fit, preventing upscale pixelation. */
        .image-card img {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }

        /* Navigation — pills */
        .nav-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: transparent;
            z-index: 100;
        }

        .nav-btn {
            width: 38px;
            height: 38px;
            border: 1.5px solid var(--nav);
            background: transparent;
            color: var(--nav);
            cursor: pointer;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            line-height: 1;
            transition: all 0.22s ease;
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background: var(--nav);
            color: var(--bg);
        }

        .dots-container {
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: rgba(92, 91, 87, 0.35);
            cursor: pointer;
            transition: all 0.22s ease;
            flex-shrink: 0;
        }

        .dot.active {
            background: var(--nav);
            width: 22px;
        }

        .dot:hover {
            background: var(--nav);
        }

        @media (max-width: 768px) {
            :root {
                --nav-h: 60px;
                --side: 32px;
                --label-side: 44px;
            }

            .slide-label {
                padding: 22px var(--label-side) 12px;
                font-size: 10px;
            }

            .slide-image {
                padding-bottom: calc(var(--nav-h) + 16px);
            }

            .image-card {
                border-radius: 16px;
            }

            .nav-container {
                gap: 16px;
            }

            .nav-btn {
                width: 34px;
                height: 34px;
                font-size: 15px;
            }

            .dot.active {
                width: 18px;
            }
        }

        @media (max-width: 420px) {
            :root {
                --side: 22px;
                --label-side: 26px;
            }

            .slide-label {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                padding: 18px var(--label-side) 10px;
            }

            .slide-label .count {
                align-self: flex-end;
                margin-top: -22px;
            }
        }

        @media (max-height: 480px) and (orientation: landscape) {
            :root {
                --nav-h: 52px;
                --side: 40px;
                --label-side: 56px;
            }

            .slide-label {
                padding: 14px var(--label-side) 8px;
            }

            .nav-btn {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="deck">
        <div class="slide active" data-slide="0">
            <div class="slide-label">
                <div><span class="eyebrow">THE PURPLE FRIDAYS<span class="slash">/</span></span>LOGO</div>
                <div class="count">01 / 04</div>
            </div>
            <div class="slide-image">
                <div class="image-card">
                    <img src="logo.png" alt="Logo" width="1920" height="1080">
                </div>
            </div>
        </div>

        <div class="slide" data-slide="1">
            <div class="slide-label">
                <div><span class="eyebrow">THE PURPLE FRIDAYS<span class="slash">/</span></span>ELEMENTS</div>
                <div class="count">02 / 04</div>
            </div>
            <div class="slide-image">
                <div class="image-card">
                    <img src="elements.png" alt="Elements" width="1920" height="1080">
                </div>
            </div>
        </div>

        <div class="slide" data-slide="2">
            <div class="slide-label">
                <div><span class="eyebrow">THE PURPLE FRIDAYS<span class="slash">/</span></span>POST</div>
                <div class="count">03 / 04</div>
            </div>
            <div class="slide-image">
                <div class="image-card">
                    <img src="post_porter-social.png" alt="Post" width="1600" height="2000">
                </div>
            </div>
        </div>

        <div class="slide" data-slide="3">
            <div class="slide-label">
                <div><span class="eyebrow">THE PURPLE FRIDAYS<span class="slash">/</span></span>COVER EVENT</div>
                <div class="count">04 / 04</div>
            </div>
            <div class="slide-image">
                <div class="image-card">
                    <img src="event-bride-cover-event.png" alt="Cover Event" width="2160" height="1080">
                </div>
            </div>
        </div>
    </div>

    <div class="nav-container">
        <button class="nav-btn prev" aria-label="Anterior">‹</button>
        <div class="dots-container">
            <div class="dot active" data-index="0"></div>
            <div class="dot" data-index="1"></div>
            <div class="dot" data-index="2"></div>
            <div class="dot" data-index="3"></div>
        </div>
        <button class="nav-btn next" aria-label="Seguinte">›</button>
    </div>

    <script>
        class Deck {
            constructor() {
                this.current = 0;
                this.total = 4;
                this.slides = document.querySelectorAll('.slide');
                this.dots = document.querySelectorAll('.dot');
                document.querySelector('.nav-btn.prev').addEventListener('click', () => this.prev());
                document.querySelector('.nav-btn.next').addEventListener('click', () => this.next());
                this.dots.forEach((dot, i) => dot.addEventListener('click', () => this.go(i, i > this.current ? 1 : -1)));
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.prev();
                    if (e.key === 'ArrowRight') this.next();
                });
                let startX = 0;
                document.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
                document.addEventListener('touchend', (e) => {
                    const diff = startX - e.changedTouches[0].clientX;
                    if (diff > 50) this.next();
                    if (diff < -50) this.prev();
                });
            }
            go(i, dir = 1) {
                if (i < 0 || i >= this.total || i === this.current) return;
                const outgoing = this.slides[this.current];
                const incoming = this.slides[i];

                // place incoming offset on the side it travels in from
                incoming.classList.remove('from-right', 'from-left', 'active');
                incoming.classList.add(dir > 0 ? 'from-right' : 'from-left');

                // force reflow so the starting offset is applied before transitioning
                void incoming.offsetWidth;

                outgoing.classList.remove('active');
                this.dots[this.current].classList.remove('active');

                incoming.classList.remove('from-right', 'from-left');
                incoming.classList.add('active');

                this.current = i;
                this.dots[this.current].classList.add('active');
            }
            next() { this.go((this.current + 1) % this.total, 1); }
            prev() { this.go((this.current - 1 + this.total) % this.total, -1); }
        }
        document.addEventListener('DOMContentLoaded', () => new Deck());
    </script>
</body>
</html>
